name: Implement issue 7

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  implement:
    if: github.event.pull_request.head.ref == 'feat/issue-7-ellipsis'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/issue-7-ellipsis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply implementation
        run: |
          python3 .github/scripts/apply_issue_7.py
          python3 .github/scripts/apply_issue_7_tests_docs.py

      - name: Format Go files
        run: |
          gofmt -w \
            token/token.go \
            lexer/lexer.go lexer/ellipsis_test.go \
            ast/ast.go \
            parser/parser.go parser/ellipsis_test.go \
            types/types.go types/ellipsis_test.go \
            operator/types.go operator/emit.go \
            compiler/check.go compiler/lower.go compiler/ellipsis_test.go

      - name: Check patch formatting
        run: git diff --check

      - name: Run focused tests
        run: go test ./token ./lexer ./ast ./parser ./types ./operator ./compiler

      - name: Run full test suite
        run: go test ./...

      - name: Save patch
        if: always()
        run: git diff --binary -- . ':(exclude).github' > issue-7.patch

      - name: Upload patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-7-patch
          path: issue-7.patch

      - name: Commit implementation
        run: |
          rm .github/scripts/apply_issue_7.py
          rm .github/scripts/apply_issue_7_tests_docs.py
          rm .github/workflows/issue-7-implement.yml
          rmdir .github/scripts 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "compat: add Ellipsis literal and EllipsisType"
          git push origin HEAD:feat/issue-7-ellipsis
